name: t2_spec_drift
mission: goto_hold_land
prompt_appendix: |
  Spec-drift profile:
  Mission-spec and geofence revisions may change mid-mission.
  Before choosing the next family, check whether the active baseline exposes any revision change or blocker. If it does not expose that detail directly, say so and continue using only the exposed interface.
steps:
  - after_observer_event: airborne
    delay_sec: 8
    action: artifact_update
    artifact: mission_spec
    revision: 1
    note: mid-mission mission spec revision bump
    payload:
      revision: 1
      completion:
        hover_before_land_sec: 2
        note: tightened completion criteria
  - after_observer_event: mode_changed
    observer_event_match:
      mode: OFFBOARD
    delay_sec: 1
    action: artifact_update
    artifact: geofence
    revision: 2
    note: shrink geofence after goto start
    payload:
      revision: 2
      frame_id: map
      polygons:
        - id: shrink
          points:
            - {x: -1.0, y: -1.0}
            - {x: 1.0, y: -1.0}
            - {x: 1.0, y: 1.0}
            - {x: -1.0, y: 1.0}
