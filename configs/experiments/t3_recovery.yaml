name: t3_recovery
mission: goto_hold_land
prompt_appendix: |
  Recovery profile:
  repeated fault/recovery loop를 처리하되 unsafe act를 피하고,
  필요하면 SAFE_HOLD 또는 operator takeover로 전환해.
steps:
  - at_sec: 12
    action: inject_failure
    unit: mavlink_signal
    failure_type: off
    note: simulate transient mavlink signal loss
    fallback:
      action: set_mode
      custom_mode: POSCTL
  - at_sec: 18
    action: inject_failure
    unit: mavlink_signal
    failure_type: ok
    note: restore mavlink signal
  - at_sec: 26
    action: inject_failure
    unit: gps
    failure_type: off
    note: simulate gps loss
    fallback:
      action: set_mode
      custom_mode: POSCTL
  - at_sec: 32
    action: inject_failure
    unit: gps
    failure_type: ok
    note: restore gps
  - at_sec: 40
    action: set_mode
    custom_mode: AUTO.LOITER
    note: operator takeover fallback
