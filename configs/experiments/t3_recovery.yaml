name: t3_recovery
mission: goto_hold_land
prompt_appendix: |
  Recovery profile:
  Two OFFBOARD-loss or mode-flip faults may occur.
  After each recovery, return to the nominal sequence without unsafe action and finish the terminal stage.
steps:
  - after_observer_event: excursion_reached
    delay_sec: 0
    action: inject_failure
    unit: mavlink_signal
    failure_type: "off"
    expect_observer_event: mode_changed
    expect_timeout_sec: 5
    note: simulate offboard interruption just before arrival
    fallback:
      action: set_mode
      custom_mode: AUTO.LOITER
  - after_observer_event: fault_recovered
    occurrence: 1
    delay_sec: 8
    action: inject_failure
    unit: mavlink_signal
    failure_type: "off"
    expect_observer_event: mode_changed
    expect_timeout_sec: 5
    note: simulate repeated offboard interruption during landing handoff
    fallback:
      action: set_mode
      custom_mode: AUTO.LOITER
