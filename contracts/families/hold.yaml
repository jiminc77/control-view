family: HOLD
risk_class: medium
argument_schema:
  type: object
  properties: {}
guard_slots:
  - vehicle.connected
  - vehicle.mode
  - vehicle.armed
  - mission.spec.rev
  - tool_registry.rev
support_slots: []
confirm_slots: [vehicle.mode, nav.progress]
diagnostic_slots: [velocity.local]
predicates:
  - id: connected_ok
    expr: vehicle.connected == true
  - id: armed_ok
    expr: vehicle.armed == true
backend_mapping:
  kind: service
  service: /mavros/set_mode
  custom_mode: AUTO.LOITER
effects:
  invalidates: [nav.progress]
obligation_templates:
  - id: HOLD_PENDING
    open_on: ACKED_WEAK
    close_when:
      - expr: (vehicle.mode == "AUTO.LOITER" or vehicle.mode == "AUTO.TAKEOFF") and nav.progress.phase == "HOLDING"
        for_sec: 1.0
    fail_when:
      - not_confirmed_within_sec: 5.0
safe_hold_mapping:
  backend_action: HOLD
