id: offboard.stream.ok
class: derived_quality
owner: sidecar
value_schema:
  type: object
  properties:
    value: {type: boolean}
    publish_rate_hz: {type: number}
    last_publish_age_ms: {type: number}
    warmup_elapsed_ms: {type: number}
source:
  kind: worker_monitor
authority:
  order: [offboard_stream_worker]
derivation:
  kind: worker_health
  dependencies: []
revision_rule: increment_on_change
freshness:
  ttl_ms: {low: 500, medium: 250, high: 250}
  lease_ms: 80
invalidators:
  - offboard_stream_lost
  - worker_restart
serialization_policy:
  include: [value, authority_source, observed_age_ms, revision]
