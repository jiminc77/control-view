id: vehicle.mode
class: event_discrete
owner: backend
value_type: string
source:
  topic: /mavros/state
  field: mode
authority:
  order: [mavros_state]
revision_rule: increment_on_change
freshness:
  ttl_ms: {low: 2000, medium: 1000, high: 500}
  lease_ms: 250
invalidators:
  - operator_mode_override
  - vehicle_reconnect
serialization_policy:
  include: [value, authority_source, observed_age_ms, revision]

